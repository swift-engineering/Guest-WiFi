<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swift Engineering Guest Wi-Fi</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f0f9ff, #7dd3fc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 20px;
      padding-bottom: 40px;
      color: #0f172a;
    }

    .card {
      background: white;
      max-width: 420px;
      width: 100%;
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
    }

    .badge {
      width: 85px;
      height: 50px;
      border-radius: 18px;
      background: #1d4ed8;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 26px;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      color: #1e3a8a;
    }

    .subtitle {
      color: #64748b;
      margin: 8px 0 28px;
      font-size: 15px;
    }

    .info {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 14px;
      text-align: left;
    }

    .label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 5px;
    }

    .value {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      word-break: break-word;
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      padding: 16px;
      background: #1d4ed8;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    button:hover {
      background: #1e40af;
    }

    .steps {
      margin-top: 22px;
      background: #eff6ff;
      border-radius: 18px;
      padding: 16px;
      text-align: left;
      color: #334155;
      font-size: 14px;
      line-height: 1.6;
    }

    .copied {
      margin-top: 12px;
      color: #16a34a;
      font-size: 14px;
      font-weight: bold;
      display: none;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">Wi-Fi</div>

    <h1>Swift Engineering</h1>
    <p class="subtitle">Guest Wi-Fi Access</p>

    <div class="info">
      <div class="label">Network Name</div>
      <div class="value">Swift-Guest</div>
    </div>

    <div class="info">
      <div class="label">Password</div>
      <div class="value">BYOD2Swift</div>
    </div>

    <button onclick="copyPassword()">Copy Wi-Fi Password</button>

    <div id="copied" class="copied">Password copied!</div>

    <div class="steps">
      <strong>How to connect:</strong><br />
      1. Tap “Copy Wi-Fi Password”<br />
      2. Open Settings → Wi-Fi<br />
      3. Select <strong>Swift-Guest</strong><br />
      4. Paste the password
    </div>
  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText("BYOD2Swift");
      document.getElementById("copied").style.display = "block";
    }
  </script>
</body>
</html>
